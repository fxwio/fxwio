<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fuxiang Wang profile banner</title>
  <desc id="desc">Editorial style banner in a warm Claude-inspired palette for an engineer focused on AI infrastructure, system performance, and reliability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBF6F0"/>
      <stop offset="1" stop-color="#F2E7DB"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1036 92) rotate(90) scale(180 220)">
      <stop offset="0" stop-color="#E7C8B4" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#E7C8B4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="904" y1="246" x2="1188" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#C15C3F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#8A6B58" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1280" height="400" rx="32" fill="url(#bg)"/>
  <rect x="16" y="16" width="1248" height="368" rx="24" stroke="#DDCCC0" stroke-width="2"/>
  <rect x="0" y="0" width="1280" height="400" rx="32" fill="url(#glow)"/>

  <g opacity="0.5">
    <path d="M760 52C860 84 954 136 1206 132" stroke="#D9C7BA" stroke-width="2"/>
    <path d="M734 96C862 130 992 188 1218 186" stroke="#D9C7BA" stroke-width="2"/>
    <path d="M724 142C862 180 1000 238 1210 246" stroke="#D9C7BA" stroke-width="2"/>
    <path d="M754 206C878 246 988 304 1172 334" stroke="#D9C7BA" stroke-width="2"/>
  </g>

  <text x="88" y="74" fill="#B85F44" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18" letter-spacing="4">FXWIO / ENGINEERING</text>

  <text x="88" y="138" fill="#261D17" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">AI infrastructure,</text>
  <text x="88" y="208" fill="#261D17" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">performance,</text>
  <text x="88" y="278" fill="#261D17" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">reliability.</text>

  <text x="90" y="318" fill="#6E5A4B" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">Go backend engineer building gateways, retrieval systems,</text>
  <text x="90" y="348" fill="#6E5A4B" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">and release-ready services.</text>

  <g>
    <rect x="88" y="356" width="58" height="24" rx="12" fill="#FFF9F4" stroke="#D7B9A5"/>
    <rect x="158" y="356" width="126" height="24" rx="12" fill="#FFF9F4" stroke="#D7B9A5"/>
    <rect x="296" y="356" width="114" height="24" rx="12" fill="#FFF9F4" stroke="#D7B9A5"/>
    <text x="117" y="372" text-anchor="middle" fill="#4A3A30" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14">Go</text>
    <text x="221" y="372" text-anchor="middle" fill="#4A3A30" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14">LLM Gateway</text>
    <text x="353" y="372" text-anchor="middle" fill="#4A3A30" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14">RAG Systems</text>
  </g>

  <g opacity="0.75">
    <rect x="790" y="40" width="368" height="226" rx="28" transform="rotate(3 790 40)" stroke="#D9C7BA" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="736" y="64" width="438" height="248" rx="28" fill="#FFF9F4" stroke="#DDCCC0" stroke-width="2"/>
    <text x="772" y="106" fill="#B85F44" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="16" letter-spacing="3">SELECTED SYSTEMS</text>

    <circle cx="770" cy="142" r="6" fill="#D97757"/>
    <text x="790" y="150" fill="#261D17" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="700">Strait</text>
    <text x="790" y="174" fill="#6E5A4B" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">OpenAI-compatible gateway in Go</text>

    <circle cx="770" cy="202" r="6" fill="#D97757"/>
    <text x="790" y="210" fill="#261D17" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="700">Shoal</text>
    <text x="790" y="234" fill="#6E5A4B" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Hybrid retrieval and grounded RAG</text>

    <circle cx="770" cy="262" r="6" fill="#D97757"/>
    <text x="790" y="270" fill="#261D17" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="700">ccyaa.cn</text>
    <text x="790" y="294" fill="#6E5A4B" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Writing, notes, and design system work</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="898" y="242" width="266" height="110" rx="24" fill="url(#accent)"/>
    <text x="928" y="272" fill="#FFF9F4" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" letter-spacing="2">WORK STYLE</text>
    <text x="928" y="300" fill="#FFF9F4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">Clear boundaries.</text>
    <text x="928" y="326" fill="#FFF9F4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">Observable behavior.</text>
    <text x="928" y="352" fill="#FFF9F4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">Reliable release.</text>
  </g>
</svg>
