<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fuxiang Wang profile banner</title>
  <desc id="desc">Minimal warm-toned banner for an engineer focused on AI infrastructure, system performance, and reliability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBF7F1"/>
      <stop offset="1" stop-color="#F4ECE1"/>
    </linearGradient>
    <linearGradient id="accent" x1="910" y1="56" x2="1210" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D07A55"/>
      <stop offset="1" stop-color="#BD6643"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <rect x="16" y="16" width="1248" height="328" rx="20" stroke="#DDCFC2" stroke-width="1.5"/>

  <path d="M850 44C929 76 1012 140 1228 138" stroke="#DDD0C4" stroke-width="2"/>
  <path d="M808 102C920 136 1044 212 1224 222" stroke="#DDD0C4" stroke-width="2"/>
  <path d="M828 172C940 214 1048 286 1190 320" stroke="#DDD0C4" stroke-width="2"/>

  <circle cx="1088" cy="170" r="126" stroke="#E6D9CD" stroke-width="1.5"/>
  <circle cx="1088" cy="170" r="84" stroke="#E6D9CD" stroke-width="1.5"/>
  <circle cx="1088" cy="170" r="24" fill="url(#accent)"/>

  <rect x="938" y="246" width="232" height="44" rx="22" fill="#FFF9F3" stroke="#D8C2B0" stroke-width="1.5"/>
  <text x="1054" y="274" text-anchor="middle" fill="#423329" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="16">SYSTEMS / PERFORMANCE</text>

  <text x="84" y="68" fill="#BE6C49" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="16" letter-spacing="4">FXWIO / PROFILE</text>
  <text x="84" y="138" fill="#241C17" font-family="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Baskerville, Georgia, serif" font-size="66" font-weight="700">AI infrastructure,</text>
  <text x="84" y="202" fill="#241C17" font-family="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Baskerville, Georgia, serif" font-size="66" font-weight="700">performance,</text>
  <text x="84" y="266" fill="#241C17" font-family="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Baskerville, Georgia, serif" font-size="66" font-weight="700">reliability.</text>

  <text x="84" y="312" fill="#6A584C" font-family="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Baskerville, Georgia, serif" font-size="26" font-style="italic">Simplicity is prerequisite for reliability.</text>
  <text x="84" y="336" fill="#BE6C49" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="15" letter-spacing="1.5">EDSGER W. DIJKSTRA</text>
